syntax = "proto3";

package wal;

option go_package = "github.com/imPranav14/Distributed-KV-Store/proto/wal;wal";

enum OpType {
  OP_TYPE_UNSPECIFIED = 0;
  PUT = 1;
  APPEND = 2;
}

message WalEntry {
  OpType type = 1;
  string key = 2;
  string value = 3;
  string client_id = 4;
  uint64 request_id = 5;
}
